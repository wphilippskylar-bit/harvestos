<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harvest OS — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f7f3;
      color: #1F4E2E;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 360px; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #3d7f57; font-size: 0.95rem; line-height: 1.4; }
    button {
      margin-top: 1rem;
      background: #1F4E2E;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 0.6rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Harvest OS can't reach the network right now. Pages you've already opened may still work from
      cache, but logging new data needs a connection.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
